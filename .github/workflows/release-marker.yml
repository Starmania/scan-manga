name: Release marker.json

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    release-marker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Generate release metadata
              run: |
                  echo "RELEASE_TAG=release-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_ENV"
                  echo "RELEASE_NAME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  name: ${{ env.RELEASE_NAME }}
                  files: marker.json
